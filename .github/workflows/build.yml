name: Build Launcher
on:
  push:
    branches:
      - main
    tags:
      - 'v*' # This triggers the release when you push a tag like v1.0.0

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Using the latest stable Node version

      - name: Install Dependencies
        run: npm install

      - name: Build Electron App
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Updated to v4 to fix the error
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-Exe-Package
          path: dist/*.exe

      # This creates the "Releases" page on GitHub automatically
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
